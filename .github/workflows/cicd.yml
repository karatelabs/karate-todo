name: cicd

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  api:
    name: API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run API tests
        run: ./mvnw -B test
      - name: Upload API report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-report
          path: target/karate-reports
          retention-days: 14

  ui:
    name: UI tests (Testcontainers)
    needs: api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run UI tests (chromedp/headless-shell via Testcontainers)
        run: ./mvnw -B verify -Pui
      - name: Upload UI report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-report
          path: target/karate-reports
          retention-days: 14

  gatling:
    name: Gatling smoke
    needs: ui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Start app in background
        run: |
          nohup ./mvnw -B test -Dtest=LocalRunner > target/local-runner.log 2>&1 &
          echo $! > target/local-runner.pid
          for i in {1..30}; do
            if nc -z localhost 8080; then break; fi
            sleep 1
          done
          nc -z localhost 8080 || (echo "app did not start"; cat target/local-runner.log; exit 1)
      - name: Run Gatling simulation
        run: ./mvnw -B test -P gatling
      - name: Stop app
        if: always()
        run: kill "$(cat target/local-runner.pid)" || true
      - name: Upload Gatling report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatling-report
          path: target/gatling
          retention-days: 14

  secret-scan:
    name: Secret-leak scan
    needs: gatling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: api-report
          path: reports/api
      - uses: actions/download-artifact@v4
        with:
          name: ui-report
          path: reports/ui
      - uses: actions/download-artifact@v4
        with:
          name: gatling-report
          path: reports/gatling
      - name: Grep reports for known secret patterns
        run: |
          set +e
          PATTERNS='Bearer [A-Za-z0-9_.\-]{20,}|gh[pousr]_[A-Za-z0-9]{30,}|sk-[A-Za-z0-9]{20,}|AKIA[0-9A-Z]{16}|-----BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----'
          MATCHES=$(grep -REn "$PATTERNS" reports/ || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::secrets found in published reports:"
            echo "$MATCHES"
            exit 1
          fi
          echo "no secret patterns matched"

  publish:
    name: Publish reports to gh-pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: api-report
          path: public/latest/api
      - uses: actions/download-artifact@v4
        with:
          name: ui-report
          path: public/latest/ui
      - uses: actions/download-artifact@v4
        with:
          name: gatling-report
          path: public/latest/gatling
      - name: Generate index
        run: |
          cat > public/latest/index.html <<'HTML'
          <!doctype html>
          <html>
          <head><meta charset="utf-8"><title>karate-todo reports</title>
          <style>body{font-family:system-ui,sans-serif;max-width:48rem;margin:3rem auto;padding:0 1rem}
          a{display:block;padding:.5rem 0}</style></head>
          <body>
            <h1>karate-todo — latest CI reports</h1>
            <p>Published from <code>main</code>. See <a href="https://github.com/karatelabs/karate-todo">the repo</a>.</p>
            <a href="api/">API test report (Karate)</a>
            <a href="ui/">UI test report (Karate + Testcontainers)</a>
            <a href="gatling/">Gatling performance report</a>
          </body>
          </html>
          HTML
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: public
          keep_files: false
